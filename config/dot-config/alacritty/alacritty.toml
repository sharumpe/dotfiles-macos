[general]
live_config_reload = true
import = [
  "~/.config/alacritty/themes/tokyo-night/tokyo-night.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
decorations = "Buttonless"
opacity = 0.9
#blur = true
startup_mode = "Fullscreen"
dynamic_title = false

[font]
normal.family = "Hack Nerd Font Mono"
size = 16

